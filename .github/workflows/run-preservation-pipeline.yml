name: Run preservation pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - '.github/workflows/run-preservation-pipeline.yml'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests beautifulsoup4 lxml openpyxl pyarrow scikit-learn

      - name: Build evidence table
        run: python src/01_build_evidence_table.py

      - name: Compute descriptors
        run: python src/03_compute_descriptors.py

      - name: Generate virtual formulation universe
        run: |
          if [ -f src/04_generate_virtual_formulation_universe.py ]; then
            python src/04_generate_virtual_formulation_universe.py
          else
            echo "Skipping virtual universe generation: script not found."
          fi

      - name: Build assay-risk outputs
        run: |
          if [ -f src/05_build_assay_risk_engine.py ]; then
            python src/05_build_assay_risk_engine.py
          else
            echo "Skipping assay-risk engine: script not found."
          fi

      - name: Run deep-learning recommendation scaffold
        run: |
          if [ -f src/09_deep_learning_model.py ]; then
            python src/09_deep_learning_model.py
          else
            echo "Skipping deep-learning scaffold: script not found."
          fi

      - name: List generated outputs
        run: |
          echo "Generated output files:"
          find outputs -maxdepth 2 -type f -print || true

      - name: Upload preservation artifact package
        uses: actions/upload-artifact@v4
        with:
          name: preservation-state-platform-outputs
          path: outputs/
          if-no-files-found: error
          retention-days: 30
