name: Run Preservation State Pipeline

on:
  workflow_dispatch:

jobs:
  build-platform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests pyyaml pyarrow scikit-learn openpyxl beautifulsoup4 lxml

      - name: Create output directories
        run: |
          mkdir -p outputs
          mkdir -p models

      - name: Run evidence mining
        run: python src/01_build_evidence_table.py

      - name: Generate descriptors
        run: python src/03_compute_descriptors.py

      - name: Generate virtual formulation universe
        run: python src/04_generate_virtual_formulation_universe.py

      - name: Build assay risk engine
        run: python src/05_build_assay_risk_engine.py

      - name: Upload generated outputs
        uses: actions/upload-artifact@v4
        with:
          name: preservation-platform-outputs
          path: outputs/
